kind = "web"
previewPath = "/"
title = "eLIGA26"
version = "1.0.0"
id = "artifacts/eliga26"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25281
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/eliga26 run dev"

[services.env]
PORT = "25281"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/eliga26", "run", "build"]
publicDir = "artifacts/eliga26/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
